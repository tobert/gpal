<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 644" width="576" height="644" role="img">
  <desc>Final gpal logo: transparent background. A friendly four-pointed sparkle character with concave-curved sides, blue-to-purple-to-pink diagonal gradient, white radial gloss highlight upper-left, two white circular eyes and a curved white smile in the center. Soft drop shadow.</desc>
  <rect width="100%" height="100%" fill="#1a1a2e" rx="8"/>
  <text x="288" y="52" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="16" fill="#e0e0e0" opacity="0.7">
    gpal-logo-final
  </text>
  <rect x="32" y="72" width="512" height="512"
        fill="#16213e" rx="6"/>
  <svg x="32" y="72" width="512" height="512">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5BB4FF"/>
      <stop offset="55%" stop-color="#A06EE8"/>
      <stop offset="100%" stop-color="#FF6FA8"/>
    </linearGradient>
    <radialGradient id="gloss" cx="32%" cy="26%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.50"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="9"/>
      <feOffset dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- transparent background -->
  <g filter="url(#shadow)">
    <path d="M 256 55 Q 316 196 457 256 Q 316 316 256 457 Q 196 316 55 256 Q 196 196 256 55 Z" fill="url(#grad)" stroke="url(#grad)" stroke-width="14" stroke-linejoin="round"/>
    <path d="M 256 55 Q 316 196 457 256 Q 316 316 256 457 Q 196 316 55 256 Q 196 196 256 55 Z" fill="url(#gloss)" stroke="url(#gloss)" stroke-width="14" stroke-linejoin="round"/>
    <circle cx="218" cy="250" r="15" fill="#ffffff"/>
    <circle cx="294" cy="250" r="15" fill="#ffffff"/>
    <path d="M 230 278 Q 256 288 282 278"
          fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
  </g>
</svg>
  </svg>
  <text x="288" y="636" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="11" fill="#e0e0e0" opacity="0.35">
    512×512 · Scry
  </text>
</svg>