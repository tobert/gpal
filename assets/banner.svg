<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" role="img">
  <title>gpal — Your Pal Gemini</title>
  <desc>Friendly four-pointed sparkle character on the left with face. 'gpal' wordmark in bold blue-purple-pink gradient on the right. Tagline 'YOUR PAL GEMINI' beneath. Transparent background.</desc>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5BB4FF"/>
      <stop offset="55%" stop-color="#A06EE8"/>
      <stop offset="100%" stop-color="#FF6FA8"/>
    </linearGradient>
    <radialGradient id="gloss" cx="32%" cy="26%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.50"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dy="9"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.30"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <path d="M 90 68 Q 97 83 112 90 Q 97 97 90 112 Q 83 97 68 90 Q 83 83 90 68 Z" fill="url(#grad)" fill-opacity="0.35"/>
  <path d="M 1410 380 Q 1419 401 1440 410 Q 1419 419 1410 440 Q 1401 419 1380 410 Q 1401 401 1410 380 Z" fill="url(#grad)" fill-opacity="0.35"/>
  <path d="M 1380 94 Q 1385 105 1396 110 Q 1385 115 1380 126 Q 1375 115 1364 110 Q 1375 105 1380 94 Z" fill="url(#grad)" fill-opacity="0.35"/>
  <path d="M 110 396 Q 114 406 124 410 Q 114 414 110 424 Q 106 414 96 410 Q 106 406 110 396 Z" fill="url(#grad)" fill-opacity="0.35"/>

  <g filter="url(#shadow)">
    <path d="M 320 50 Q 380 190 520 250 Q 380 310 320 450 Q 260 310 120 250 Q 260 190 320 50 Z" fill="url(#grad)" stroke="url(#grad)" stroke-width="14" stroke-linejoin="round"/>
    <path d="M 320 50 Q 380 190 520 250 Q 380 310 320 450 Q 260 310 120 250 Q 260 190 320 50 Z" fill="url(#gloss)" stroke="url(#gloss)" stroke-width="14" stroke-linejoin="round"/>
    <circle cx="278" cy="244" r="17" fill="#ffffff"/>
    <circle cx="362" cy="244" r="17" fill="#ffffff"/>
    <path d="M 291 274 Q 320 286 349 274" fill="none" stroke="#ffffff" stroke-width="11" stroke-linecap="round"/>
  </g>

  <text x="580" y="305"
        font-family="'Helvetica Neue', 'Arial Black', 'DejaVu Sans', Helvetica, Arial, sans-serif"
        font-size="200"
        font-weight="900"
        fill="url(#grad)"
        stroke="url(#grad)"
        stroke-width="8"
        stroke-linejoin="round"
        letter-spacing="-6">gpal</text>

  <text x="584" y="410"
        font-family="'Helvetica Neue', 'DejaVu Sans', Helvetica, Arial, sans-serif"
        font-size="34"
        font-weight="600"
        fill="#9080C0"
        letter-spacing="4">YOUR PAL GEMINI</text>
</svg>
